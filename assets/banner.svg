<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="100%" height="auto">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#1a1a4e"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#6366f1;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bgGlow">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)" rx="16"/>

  <!-- Decorative glow -->
  <ellipse cx="640" cy="160" rx="500" ry="160" fill="url(#glow)" filter="url(#bgGlow)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#accent)"/>

  <!-- Left side: Character grid -->
  <!-- Row 1: Core symbols -->
  <g filter="url(#softGlow)">
    <!-- Symbol tiles -->
    <rect x="48" y="52" width="56" height="56" rx="10" fill="rgba(99,102,241,0.2)" stroke="#6366f1" stroke-width="1.5"/>
    <text x="76" y="86" font-family="system-ui,sans-serif" font-size="24" fill="#e0e7ff" text-anchor="middle">✍️</text>
    <text x="76" y="110" font-family="system-ui,sans-serif" font-size="11" fill="#a5b4fc" text-anchor="middle">写</text>

    <rect x="116" y="52" width="56" height="56" rx="10" fill="rgba(99,102,241,0.2)" stroke="#6366f1" stroke-width="1.5"/>
    <text x="144" y="86" font-family="system-ui,sans-serif" font-size="24" fill="#e0e7ff" text-anchor="middle">🔄</text>
    <text x="144" y="110" font-family="system-ui,sans-serif" font-size="11" fill="#a5b4fc" text-anchor="middle">改</text>

    <rect x="184" y="52" width="56" height="56" rx="10" fill="rgba(99,102,241,0.2)" stroke="#6366f1" stroke-width="1.5"/>
    <text x="212" y="86" font-family="system-ui,sans-serif" font-size="24" fill="#e0e7ff" text-anchor="middle">🌐</text>
    <text x="212" y="110" font-family="system-ui,sans-serif" font-size="11" fill="#a5b4fc" text-anchor="middle">翻</text>

    <rect x="252" y="52" width="56" height="56" rx="10" fill="rgba(99,102,241,0.2)" stroke="#6366f1" stroke-width="1.5"/>
    <text x="280" y="86" font-family="system-ui,sans-serif" font-size="24" fill="#e0e7ff" text-anchor="middle">❓</text>
    <text x="280" y="110" font-family="system-ui,sans-serif" font-size="11" fill="#a5b4fc" text-anchor="middle">问</text>

    <rect x="48" y="126" width="56" height="56" rx="10" fill="rgba(99,102,241,0.2)" stroke="#6366f1" stroke-width="1.5"/>
    <text x="76" y="160" font-family="system-ui,sans-serif" font-size="24" fill="#e0e7ff" text-anchor="middle">📝</text>
    <text x="76" y="184" font-family="system-ui,sans-serif" font-size="11" fill="#a5b4fc" text-anchor="middle">总</text>

    <rect x="116" y="126" width="56" height="56" rx="10" fill="rgba(99,102,241,0.2)" stroke="#6366f1" stroke-width="1.5"/>
    <text x="144" y="160" font-family="system-ui,sans-serif" font-size="24" fill="#e0e7ff" text-anchor="middle">🔍</text>
    <text x="144" y="184" font-family="system-ui,sans-serif" font-size="11" fill="#a5b4fc" text-anchor="middle">查</text>

    <rect x="184" y="126" width="56" height="56" rx="10" fill="rgba(99,102,241,0.2)" stroke="#6366f1" stroke-width="1.5"/>
    <text x="212" y="160" font-family="system-ui,sans-serif" font-size="24" fill="#e0e7ff" text-anchor="middle">⚖️</text>
    <text x="212" y="184" font-family="system-ui,sans-serif" font-size="11" fill="#a5b4fc" text-anchor="middle">比</text>

    <rect x="252" y="126" width="56" height="56" rx="10" fill="rgba(99,102,241,0.2)" stroke="#6366f1" stroke-width="1.5"/>
    <text x="280" y="160" font-family="system-ui,sans-serif" font-size="24" fill="#e0e7ff" text-anchor="middle">⚡</text>
    <text x="280" y="184" font-family="system-ui,sans-serif" font-size="11" fill="#a5b4fc" text-anchor="middle">编</text>
  </g>

  <!-- Center connector arrows -->
  <g opacity="0.4">
    <path d="M 320 160 L 440 160" stroke="#6366f1" stroke-width="2" fill="none" stroke-dasharray="6,4"/>
    <polygon points="438,155 448,160 438,165" fill="#6366f1"/>
  </g>

  <!-- Right side: Title area -->
  <text x="480" y="105" font-family="system-ui,'PingFang SC','Microsoft YaHei',sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="2">凡语</text>
  <text x="480" y="155" font-family="system-ui,sans-serif" font-size="28" font-weight="400" fill="#a5b4fc" letter-spacing="1">FanLang</text>

  <!-- Tagline -->
  <text x="480" y="195" font-family="system-ui,sans-serif" font-size="16" fill="#c7d2fe">AI interaction in Chinese characters</text>

  <!-- Pip install badge -->
  <rect x="480" y="214" width="240" height="34" rx="17" fill="rgba(99,102,241,0.3)" stroke="#6366f1" stroke-width="1"/>
  <text x="600" y="236" font-family="system-ui,monospace" font-size="14" fill="#e0e7ff" text-anchor="middle">pip install pyfanlang</text>

  <!-- Bottom metadata bar -->
  <rect x="0" y="276" width="1280" height="44" fill="rgba(255,255,255,0.03)"/>
  <line x1="0" y1="276" x2="1280" y2="276" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <g font-family="system-ui,sans-serif" font-size="12" fill="#6366f1">
    <text x="48" y="303">MIT License</text>
    <text x="320" y="303" text-anchor="middle">⚡ OODA · RAG · Seminar · Streamlit · LangChain</text>
    <text x="1232" y="303" text-anchor="end">github.com/fanLang-1/FanLang</text>
  </g>
  <g font-family="system-ui,sans-serif" font-size="12" fill="#6b7280">
    <text x="48" y="303" fill="#78716c">MIT License</text>
    <text x="320" y="303" text-anchor="middle">⚡ OODA · RAG · Seminar · Streamlit · LangChain</text>
    <text x="1232" y="303" text-anchor="end">github.com/fanLang-1/FanLang</text>
  </g>

  <!-- OODA cycle indicators -->
  <g transform="translate(480, 260)" opacity="0.5">
    <circle cx="0" cy="0" r="3" fill="#f59e0b"/>
    <text x="10" y="4" font-family="system-ui,sans-serif" font-size="10" fill="#fbbf24">Orient</text>
    <circle cx="85" cy="0" r="3" fill="#34d399"/>
    <text x="95" y="4" font-family="system-ui,sans-serif" font-size="10" fill="#34d399">Decide</text>
    <circle cx="170" cy="0" r="3" fill="#60a5fa"/>
    <text x="180" y="4" font-family="system-ui,sans-serif" font-size="10" fill="#60a5fa">Act</text>
    <circle cx="245" cy="0" r="3" fill="#c084fc"/>
    <text x="255" y="4" font-family="system-ui,sans-serif" font-size="10" fill="#c084fc">Observe</text>
  </g>
</svg>
